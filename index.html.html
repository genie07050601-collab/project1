<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생 소통 게시판</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>🏫 우리들 소통 게시판</h1>
            <p>자유롭게 글과 사진을 올리고 친구들과 이야기해보세요!</p>
        </header>

        <!-- 게시글 작성 구역 -->
        <section class="write-section">
            <input type="text" id="username" placeholder="닉네임을 입력하세요" required>
            <textarea id="content" placeholder="오늘 어떤 일이 있었나요? 자유롭게 이야기를 나누어주세요." rows="4" required></textarea>
            
            <div class="write-bottom">
                <label for="image-input" class="file-label">📸 사진 추가</label>
                <input type="file" id="image-input" accept="image/*">
                <button id="submit-btn">게시하기</button>
            </div>
            <!-- 이미지 미리보기 -->
            <div id="image-preview-container" class="hidden">
                <img id="image-preview" src="" alt="미리보기">
                <button id="remove-img-btn">❌</button>
            </div>
        </section>

        <!-- 게시글 리스트 구역 -->
        <main id="board-feed">
            <!-- JS를 통해 게시글이 이곳에 동적으로 추가됩니다 -->
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
